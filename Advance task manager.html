<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Productivity Login</title>

  <style>

    *{
      margin:0;8
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    }

    .container{
      width:360px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      padding:35px;
      border-radius:20px;
      text-align:center;
      color:white;
    }

    h1{
      margin-bottom:25px;
      color:#00e5ff;
    }

    input{
      width:100%;
      padding:14px;
      margin:12px 0;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,0.1);
      color:white;
      outline:none;
    }

    input::placeholder{
      color:#ddd;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#00e5ff;
      color:black;
      font-weight:bold;
      cursor:pointer;
      margin-top:12px;
    }

    .switch{
      margin-top:18px;
      color:#00e5ff;
      cursor:pointer;
    }

  </style>

</head>
<body>

<div class="container">

  <h1>🚀 Smart Productivity</h1>

  <input
    type="text"
    id="username"
    placeholder="Enter Username"
  >

  <input
    type="password"
    id="password"
    placeholder="Enter Password"
  >

  <button id="mainBtn" onclick="submitForm()">
    Register
  </button>

  <div class="switch" onclick="toggleMode()">

    <span id="switchText">
      Already have account? Login
    </span>

  </div>

</div>

<script>

let loginMode = false;

function toggleMode(){

  loginMode = !loginMode;

  if(loginMode){

    document.getElementById("mainBtn")
      .innerText = "Login";

    document.getElementById("switchText")
      .innerText =
      "New User? Register";

  } else {

    document.getElementById("mainBtn")
      .innerText = "Register";

    document.getElementById("switchText")
      .innerText =
      "Already have account? Login";
  }

}

function submitForm(){

  let username =
    document.getElementById("username").value;

  let password =
    document.getElementById("password").value;

  if(username === "" || password === ""){

    alert("Please Fill All Fields");

    return;
  }

  if(!loginMode){

    localStorage.setItem(
      "username",
      username
    );

    localStorage.setItem(
      "password",
      password
    );

    alert("✅ Registration Successful");

    toggleMode();

  } else {

    let savedUser =
      localStorage.getItem("username");

    let savedPass =
      localStorage.getItem("password");

    if(username === savedUser &&
       password === savedPass){

      localStorage.setItem(
        "loggedIn",
        "true"
      );

      alert("🚀 Login Successful");
  
      window.location.href =
        "index.html";

    } else {

      alert("❌ Invalid Username or Password");

    }

  }

}

</script>

</body>
</html>
