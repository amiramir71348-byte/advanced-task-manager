<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<header>

  <h1>
    🚀 Smart Productivity Dashboard
  </h1>

  <button id="darkBtn">
    🌙 Dark Mode
  </button>

</header>

<div class="container">

  <div class="task-box">

    <input
      type="text"
      id="taskInput"
      placeholder="Enter Task"
    >

    <input
      type="datetime-local"
      id="deadline"
    >

    <button id="addBtn">
      Add Task
    </button>

  </div>

  <div class="dashboard">

    <div class="card">
      <h2>Total</h2>
      <p id="totalTasks">0</p>
    </div>

    <div class="card">
      <h2>Completed</h2>
      <p id="completedTasks">0</p>
    </div>

    <div class="card">
      <h2>Pending</h2>
      <p id="pendingTasks">0</p>
    </div>

  </div>

  <div class="chart-container">

    <canvas id="taskChart"></canvas>

  </div>

  <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
